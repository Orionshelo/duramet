services:
  - type: web
    name: duramet
    env: php
    rootDir: .
    plan: free
    buildCommand: ""
    startCommand: "heroku-php-apache2"
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
    healthCheckPath: /
